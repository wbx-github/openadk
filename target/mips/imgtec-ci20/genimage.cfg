image sdcard.img {
	hdimage {
	}

	partition uboot-spl {
		in-partition-table = "no"
		image = "u-boot-spl.bin"
		offset = 512
	}

	partition uboot {
		in-partition-table = "no"
		image = "u-boot-dtb.img"
		offset = 14K
	}

	partition uboot-env {
		in-partition-table = "no"
		image = "uboot-env.bin"
		offset = 526K
	}

	partition rootfs {
		partition-type = 0x83
		image = "rootfs.ext"
		offset = 2M
	}

	partition cfgfs {
		partition-type = 0x88
		image = "cfgfs.img"
	}
}
